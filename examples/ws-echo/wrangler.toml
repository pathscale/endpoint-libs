name = "ws-echo"
main = "worker/index.ts"
compatibility_date = "2026-03-20"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [{ name = "CONTAINER", class_name = "WsEchoContainer" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["WsEchoContainer"]

[[containers]]
name = "ws-echo"
class_name = "WsEchoContainer"
image = "../../Dockerfile.ws-echo"
max_instances = 1

[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true
